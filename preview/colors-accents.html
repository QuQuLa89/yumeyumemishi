<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; padding: 24px 28px; box-sizing: border-box; position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; pointer-events: none;
    background-image: url('../assets/textures/grain.svg'); background-size: 240px 240px;
    opacity: 0.08; mix-blend-mode: overlay; }
  .group { display: flex; gap: 0; border: 1px solid var(--border-faint); margin-bottom: 14px; }
  .sw { flex: 1; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 10px; box-sizing: border-box; }
  .sw .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; }
  .sw .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.75; margin-top: 2px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.32em; color: var(--fg-faint); text-transform: uppercase; margin-bottom: 8px; }
  .lbl b { color: var(--paper-200); font-weight: 500; margin-right: 8px; }
  .ja { font-family: var(--font-mincho); font-size: 14px; color: var(--paper-200); margin-right: 6px; }
</style>
</head><body>
<div class="card">
  <div class="grain"></div>

  <div class="lbl"><span class="ja">朱</span><b>SHU</b>vermillion · primary action</div>
  <div class="group">
    <div class="sw" style="background:#3a0d09;color:#f4ede0"><div class="name">shu-900</div><div class="hex">#3a0d09</div></div>
    <div class="sw" style="background:#7a1a12;color:#f4ede0"><div class="name">shu-700</div><div class="hex">#7a1a12</div></div>
    <div class="sw" style="background:#b8341f;color:#f4ede0"><div class="name">shu-500</div><div class="hex">#b8341f</div></div>
    <div class="sw" style="background:#d4533a;color:#0a0d12"><div class="name">shu-400</div><div class="hex">#d4533a</div></div>
    <div class="sw" style="background:#e87a5f;color:#0a0d12"><div class="name">shu-300</div><div class="hex">#e87a5f</div></div>
  </div>

  <div class="lbl"><span class="ja">群青</span><b>GUNJŌ</b>deep blue · links · used sparingly</div>
  <div class="group">
    <div class="sw" style="background:#1a2a4a;color:#f4ede0"><div class="name">gunjo-700</div><div class="hex">#1a2a4a</div></div>
    <div class="sw" style="background:#2c4a7c;color:#f4ede0"><div class="name">gunjo-500</div><div class="hex">#2c4a7c</div></div>
    <div class="sw" style="background:#6b8bb5;color:#0a0d12"><div class="name">gunjo-300</div><div class="hex">#6b8bb5</div></div>
  </div>

  <div class="lbl"><span class="ja">鈍金</span><b>KIN</b>dull gold · dates · numerics</div>
  <div class="group">
    <div class="sw" style="background:#6b5520;color:#f4ede0"><div class="name">kin-700</div><div class="hex">#6b5520</div></div>
    <div class="sw" style="background:#a88a3d;color:#0a0d12"><div class="name">kin-500</div><div class="hex">#a88a3d</div></div>
    <div class="sw" style="background:#d4b878;color:#0a0d12"><div class="name">kin-300</div><div class="hex">#d4b878</div></div>
  </div>
</div>
</body></html>
