<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; padding: 28px 32px; box-sizing: border-box; position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; pointer-events: none;
    background-image: url('../assets/textures/grain.svg'); background-size: 240px 240px;
    opacity: 0.08; mix-blend-mode: overlay; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.32em; color: var(--fg-faint); text-transform: uppercase; margin-bottom: 18px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 14px 0; border-bottom: 1px solid var(--border-faint); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); width: 110px; flex-shrink: 0; letter-spacing: 0.12em; }
  .specimen { color: var(--fg); }
</style>
</head><body>
<div class="card">
  <div class="grain"></div>
  <div class="lbl">04 / Display — Shippori Mincho</div>
  <div class="row">
    <div class="meta">96 / 700</div>
    <div class="specimen" style="font-family: var(--font-mincho); font-weight: 700; font-size: 80px; line-height: 1; letter-spacing: 0.02em;">夜半</div>
  </div>
  <div class="row">
    <div class="meta">44 / 600</div>
    <div class="specimen" style="font-family: var(--font-mincho); font-weight: 600; font-size: 44px; line-height: 1.1; letter-spacing: 0.04em;">あたらしいひと</div>
  </div>
  <div class="row">
    <div class="meta">32 / 600</div>
    <div class="specimen" style="font-family: var(--font-mincho); font-weight: 600; font-size: 32px; letter-spacing: 0.06em;">新歓のしらせ</div>
  </div>
</div>
</body></html>
