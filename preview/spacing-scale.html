<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; padding: 28px 32px; box-sizing: border-box; position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; pointer-events: none;
    background-image: url('../assets/textures/grain.svg'); background-size: 240px 240px;
    opacity: 0.08; mix-blend-mode: overlay; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.32em; color: var(--fg-faint); text-transform: uppercase; margin-bottom: 14px; }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--paper-50); }
  .tok { font-family: var(--font-mono); font-size: 9px; color: var(--fg-faint); letter-spacing: 0.16em; }
  .px  { font-family: var(--font-mono); font-size: 9px; color: var(--paper-300); }
</style>
</head><body>
<div class="card">
  <div class="grain"></div>
  <div class="lbl">07 / Spacing scale — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64</div>
  <div class="scale">
    <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="tok">sp-1</div><div class="px">4</div></div>
    <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="tok">sp-2</div><div class="px">8</div></div>
    <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="tok">sp-3</div><div class="px">12</div></div>
    <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="tok">sp-4</div><div class="px">16</div></div>
    <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="tok">sp-5</div><div class="px">24</div></div>
    <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="tok">sp-6</div><div class="px">32</div></div>
    <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="tok">sp-7</div><div class="px">48</div></div>
    <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="tok">sp-8</div><div class="px">64</div></div>
    <div class="step"><div class="box" style="width:96px;height:96px"></div><div class="tok">sp-9</div><div class="px">96</div></div>
  </div>
</div>
</body></html>
