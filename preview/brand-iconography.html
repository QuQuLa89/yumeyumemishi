<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; padding: 28px 32px; box-sizing: border-box; position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; pointer-events: none;
    background-image: url('../assets/textures/grain.svg'); background-size: 240px 240px;
    opacity: 0.08; mix-blend-mode: overlay; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.32em; color: var(--fg-faint); text-transform: uppercase; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 18px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--paper-100); }
  .ic img { width: 28px; height: 28px; }
  .ic .n { font-family: var(--font-mono); font-size: 8px; color: var(--fg-faint); letter-spacing: 0.12em; }
</style>
</head><body>
<div class="card">
  <div class="grain"></div>
  <div class="lbl">15 / Iconography — hairline objects</div>
  <div class="grid">
    <div class="ic"><img src="../assets/icons/lamp.svg"/><div class="n">LAMP</div></div>
    <div class="ic"><img src="../assets/icons/cassette.svg"/><div class="n">CASSETTE</div></div>
    <div class="ic"><img src="../assets/icons/key.svg"/><div class="n">KEY</div></div>
    <div class="ic"><img src="../assets/icons/door.svg"/><div class="n">DOOR</div></div>
    <div class="ic"><img src="../assets/icons/window.svg"/><div class="n">WINDOW</div></div>
    <div class="ic"><img src="../assets/icons/book.svg"/><div class="n">BOOK</div></div>
    <div class="ic"><img src="../assets/icons/letter.svg"/><div class="n">LETTER</div></div>
    <div class="ic"><img src="../assets/icons/match.svg"/><div class="n">MATCH</div></div>
    <div class="ic"><img src="../assets/icons/film-canister.svg"/><div class="n">FILM</div></div>
    <div class="ic"><img src="../assets/icons/tape-reel.svg"/><div class="n">REEL</div></div>
    <div class="ic"><img src="../assets/icons/calendar.svg"/><div class="n">CAL</div></div>
    <div class="ic"><img src="../assets/icons/pin.svg"/><div class="n">PIN</div></div>
    <div class="ic"><img src="../assets/icons/flame.svg"/><div class="n">FLAME</div></div>
    <div class="ic"><img src="../assets/icons/star.svg"/><div class="n">STAR</div></div>
    <div class="ic"><img src="../assets/icons/arrow-right.svg"/><div class="n">ARROW</div></div>
    <div class="ic"><img src="../assets/icons/menu.svg"/><div class="n">MENU</div></div>
  </div>
</div>
</body></html>
