<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; padding: 24px 28px; box-sizing: border-box; position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; pointer-events: none;
    background-image: url('../assets/textures/grain.svg'); background-size: 240px 240px;
    opacity: 0.08; mix-blend-mode: overlay; }
  .row { display: flex; gap: 0; border: 1px solid var(--border-faint); }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; box-sizing: border-box; }
  .sw .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; }
  .sw .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.7; margin-top: 2px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.32em; color: var(--fg-faint); text-transform: uppercase; margin-bottom: 10px; }
</style>
</head><body>
<div class="card">
  <div class="grain"></div>
  <div class="lbl">02 / Paper — foreground family (warm cream)</div>
  <div class="row">
    <div class="sw" style="background:#f4ede0;color:#0a0d12"><div class="name">paper-50</div><div class="hex">#f4ede0</div></div>
    <div class="sw" style="background:#e8e0cf;color:#0a0d12"><div class="name">paper-100</div><div class="hex">#e8e0cf</div></div>
    <div class="sw" style="background:#c8bfac;color:#0a0d12"><div class="name">paper-200</div><div class="hex">#c8bfac</div></div>
    <div class="sw" style="background:#8c8472;color:#f4ede0"><div class="name">paper-300</div><div class="hex">#8c8472</div></div>
    <div class="sw" style="background:#5a5446;color:#f4ede0"><div class="name">paper-400</div><div class="hex">#5a5446</div></div>
  </div>
</div>
</body></html>
